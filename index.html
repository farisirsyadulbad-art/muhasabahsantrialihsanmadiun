<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhasabah Amal Yaumi - Ramadhan 1447H</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #f1f8e9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        p.subtitle { text-align: center; font-size: 0.9em; color: #666; margin-bottom: 20px; }
        
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: var(--primary); border-bottom: 2px solid var(--secondary); display: block; }
        
        .grid-check { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .check-item { display: flex; align-items: center; background: var(--secondary); padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
        .check-item input { margin-right: 10px; transform: scale(1.2); }
        
        label { display: block; margin-top: 10px; font-weight: 500; font-size: 0.9em; }
        input[type="text"], textarea, input[type="date"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background: #1b5e20; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>Muhasabah Amal Yaumi</h2>
    <p class="subtitle">Liburan Ramadhan 1447 H / 2026 M</p>

    <form id="muhasabahForm">
        <label>Tanggal Ramadhan:</label>
        <input type="date" id="tanggal" required>
        
        <label>Nama Santri:</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>

        <div class="section">
            <span class="section-title">Sholat Fardhu Berjamaah (di Masjid)</span>
            <div class="grid-check">
                <label class="check-item"><input type="checkbox" id="shubuh"> Shubuh</label>
                <label class="check-item"><input type="checkbox" id="dhuhur"> Dhuhur</label>
                <label class="check-item"><input type="checkbox" id="ashar"> Ashar</label>
                <label class="check-item"><input type="checkbox" id="maghrib"> Maghrib</label>
                <label class="check-item"><input type="checkbox" id="isya"> Isya'</label>
            </div>
        </div>

        <div class="section">
            <span class="section-title">Ibadah Sunnah & Dzikir</span>
            <div class="grid-check">
                <label class="check-item"><input type="checkbox" id="sunnah"> Sunnah/Tarawih/Dhuha</label>
            </div>
        </div>

        <div class="section">
            <span class="section-title">Aktivitas Lainnya</span>
            <label>Membantu Orang Tua (Jenis Pekerjaan):</label>
            <textarea id="ortu" rows="2" placeholder="Contoh: Mencuci piring, menyapu..."></textarea>
            
            <label>Qiro'atul Qur'an (Capaian/Muroja'ah):</label>
            <input type="text" id="quran" placeholder="Contoh: Juz 30 / Al-Baqarah 1-50">
        </div>

        <button type="button" id="btnSimpan" onclick="simpanData()">Simpan Laporan Hari Ini</button>
    </form>
</div>

<script>
    function simpanData() {
        const btn = document.getElementById('btnSimpan');
        // Link Apps Script milikmu
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyhy7kRjfWrC2tZXMOA10sitAQNL0WOXmnvH37NZGRhcY4DPt6WZANpeJ34a1k5_aqy4w/exec';
        
        const tanggal = document.getElementById('tanggal').value;
        const nama = document.getElementById('nama').value;

        if(!tanggal || !nama) {
            alert("Harap isi Tanggal dan Nama!");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = "Sedang Mengirim...";

        const data = {
            tanggal: tanggal,
            nama: nama,
            shubuh: document.getElementById('shubuh').checked ? "V" : "-",
            dhuhur: document.getElementById('dhuhur').checked ? "V" : "-",
            ashar: document.getElementById('ashar').checked ? "V" : "-",
            maghrib: document.getElementById('maghrib').checked ? "V" : "-",
            isya: document.getElementById('isya').checked ? "V" : "-",
            sunnah: document.getElementById('sunnah').checked ? "Ya" : "Tidak",
            ortu: document.getElementById('ortu').value,
            quran: document.getElementById('quran').value
        };

        fetch(scriptURL, { 
            method: 'POST', 
            body: JSON.stringify(data),
            mode: 'no-cors'
        })
        .then(() => {
            alert("Alhamdulillah! Laporan berhasil dikirim.");
            document.getElementById('muhasabahForm').reset();
            btn.disabled = false;
            btn.innerHTML = "Simpan Laporan Hari Ini";
        })
        .catch(() => {
            // Karena mode no-cors, terkadang masuk ke catch padahal data terkirim
            alert("Laporan Selesai Diproses.");
            document.getElementById('muhasabahForm').reset();
            btn.disabled = false;
            btn.innerHTML = "Simpan Laporan Hari Ini";
        });
    }
</script>

</body>
</html>
